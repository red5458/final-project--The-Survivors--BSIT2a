<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            min-height: 100vh;
        }
        .dashboard-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .checkin-btn {
            background: linear-gradient(90deg, #6366f1, #ec4899);
            border: none;
            transition: transform 0.2s;
        }
        .checkin-btn:hover {
            transform: translateY(-2px);
        }
        .status-early { background: #d1fae5; color: #065f46; }
        .status-ontime { background: #dbeafe; color: #1e40af; }
        .status-late { background: #fef3c7; color: #92400e; }
        .status-absent { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="dashboard-card card p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Student Dashboard</h2>
                        <p class="text-muted">Check in for today's class</p>
                    </div>

                    <div class="alert alert-info mb-4">
                        <i class="bi bi-person-circle"></i> 
                        <strong id="studentName">Student</strong> | ID: <span id="studentId">---</span>
                    </div>

                    <button id="checkInBtn" class="btn checkin-btn btn-lg w-100 py-3 text-white fw-bold mb-4">
                        <i class="bi bi-geo-alt-fill"></i> Check In Now
                    </button>

                    <div id="resultMessage" class="d-none"></div>

                    <h5 class="mt-4 mb-3">My Attendance History</h5>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>Time In</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="myAttendanceBody">
                            </tbody>
                        </table>
                    </div>

                    <div class="text-center mt-3">
                        <a href="index.html" class="btn btn-outline-secondary">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = localStorage.getItem('token');
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));

        if (!token || !currentUser) {
            alert('Please login first');
            window.location.href = 'login.html';
        }

        document.getElementById('studentName').textContent = currentUser?.username || 'Student';
        document.getElementById('studentId').textContent = currentUser?.studentId || currentUser?.id || '---';

        document.getElementById('checkInBtn').addEventListener('click', async function() {
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';

            try {
                const response = await fetch(`${API_URL}/attendance/checkin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        studentId: currentUser.studentId || currentUser.id
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Check-in failed');
                }

                const resultDiv = document.getElementById('resultMessage');
                resultDiv.className = 'alert alert-success';
                resultDiv.innerHTML = `
                    <i class="bi bi-check-circle-fill"></i> 
                    <strong>Checked in successfully!</strong><br>
                    Status: <span class="badge bg-success">${data.status}</span><br>
                    Time: ${new Date(data.timeIn).toLocaleTimeString()}
                `;
                resultDiv.classList.remove('d-none');

                loadMyAttendance();

            } catch (error) {
                const resultDiv = document.getElementById('resultMessage');
                resultDiv.className = 'alert alert-danger';
                resultDiv.innerHTML = `<i class="bi bi-x-circle-fill"></i> Error: ${error.message}`;
                resultDiv.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-geo-alt-fill"></i> Check In Now';
            }
        });

        async function loadMyAttendance() {
            try {
                const tbody = document.getElementById('myAttendanceBody');
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">Loading...</td></tr>';
                
            } catch (error) {
                console.error('Error loading attendance:', error);
            }
        }
        window.onload = loadMyAttendance;
    </script>
</body>
</html>
