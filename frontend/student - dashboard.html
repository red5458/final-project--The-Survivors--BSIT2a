<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            min-height: 100vh;
            color: #333;
        }
        .dashboard-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: none;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .navbar {
            background: rgba(0, 0, 0, 0.85) !important;
            backdrop-filter: blur(10px);
        }
        .brand-title {
            background: linear-gradient(90deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-early { background-color: #10b981; color: white; }
        .status-ontime { background-color: #3b82f6; color: white; }
        .status-late { background-color: #f59e0b; color: white; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-3 brand-title" href="index.html">
                SmartAttendance
            </a>
            <div class="d-flex align-items-center gap-3">
                <span id="userGreeting" class="badge bg-light text-dark px-3 py-2 fs-6"></span>
                <a href="profile.html" class="nav-link text-white fw-medium">Profile</a>
                <a href="#" onclick="logout()" class="nav-link text-white fw-medium">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <!-- Welcome -->
                <div class="text-center mb-5">
                    <h1 class="display-5 fw-bold text-white">Welcome Back!</h1>
                    <p class="text-white-50 lead" id="todayDate"></p>
                </div>

                <!-- Check-In Card -->
                <div class="dashboard-card card shadow mb-5">
                    <div class="card-header bg-white border-0 py-4 text-center">
                        <h4>Quick Check-In</h4>
                        <small class="text-muted">Auto-Time Classification • Class starts at 8:00 AM</small>
                    </div>
                    <div class="card-body p-5">
                        <form id="checkinForm" class="text-center">
                            <div class="mb-4">
                                <input type="text" id="studentIdInput" 
                                       class="form-control form-control-lg text-center" 
                                       placeholder="Enter Your Student ID" 
                                       style="max-width: 380px; margin: 0 auto;" required>
                            </div>
                            <button type="submit" class="btn btn-success btn-lg px-5 py-3 fw-semibold">
                                ✅ Mark My Attendance
                            </button>
                        </form>
                        <div id="checkinResult" class="mt-4 alert d-none"></div>
                    </div>
                </div>

                <!-- History -->
                <div class="dashboard-card card shadow">
                    <div class="card-header bg-white border-0 py-3">
                        <h5>My Attendance History</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0" id="historyTable">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>Time In</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="historyBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check if user is logged in
const token = localStorage.getItem('token');
const currentUser = JSON.parse(localStorage.getItem('currentUser'));

if (!token || !currentUser) {
    alert('Please login first');
    window.location.href = 'login.html';
}

// API call helper with auth header
async function apiCall(endpoint, method = 'GET', body = null) {
    const options = {
        method,
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        }
    };
    
    if (body) {
        options.body = JSON.stringify(body);
    }
    
    const response = await fetch(`${API_URL}${endpoint}`, options);
    return response.json();
}
        const STORAGE_KEY = "attendanceRecords";

        function getCurrentUser() {
            const user = JSON.parse(localStorage.getItem("currentUser") || "{}");
            return user;
        }

        function loadRecords() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        }

        function setTodayDate() {
            document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US', {
            });
        }
