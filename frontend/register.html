<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            min-height: 100vh;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: none;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        .brand-title {
            background: linear-gradient(90deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="register-card card shadow">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="brand-title fw-bold fs-1">Smart Attendance</h2>
                            <p class="text-muted">Create your account</p>
                        </div>

                        <form id="registerForm">
                            <!-- Full Name -->
                            <div class="mb-3">
                                <label class="form-label fw-medium">Full Name</label>
                                <input type="text" id="regName" class="form-control" required>
                            </div>

                            <!-- ID Number (Student ID or Teacher ID) -->
                            <div class="mb-3">
                                <label class="form-label fw-medium">ID Number</label>
                                <input type="text" id="regStudentId" class="form-control" 
                                       placeholder="2020-0000-00000 to 2026-0000-00000 (Student) or TEACHER01" required>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label fw-medium">Email</label>
                                <input type="email" id="regEmail" class="form-control" required>
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label class="form-label fw-medium">Password</label>
                                <input type="password" id="regPassword" class="form-control" required>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-3">
                                <label class="form-label fw-medium">Confirm Password</label>
                                <input type="password" id="regConfirmPassword" class="form-control" required>
                            </div>

                            <!-- Role -->
                            <div class="mb-4">
                                <label class="form-label fw-medium">Role</label>
                                <select id="regRole" class="form-select">
                                    <option value="student">Student</option>
                                    <option value="teacher">Teacher</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-3 fw-semibold">
                                Create Account
                            </button>
                        </form>

                        <div class="text-center mt-3">
                            <a href="login.html" class="text-decoration-none text-primary">
                                Already have an account? Login here
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Get all form values
            const username = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const role = document.getElementById('regRole').value;
            const studentId = document.getElementById('regStudentId').value.trim();

            // Validation
            if (!username || !email || !password || !studentId) {
                alert("Please fill in all fields!");
                return;
            }

            if (password !== confirmPassword) {
                alert("Passwords don't match!");
                return;
            }

            if (password.length < 6) {
                alert("Password must be at least 6 characters!");
                return;
            }

            try {
                console.log("Sending registration data:", { username, email, role, studentId });

                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        role,
                        studentId: role === 'student' ? studentId : undefined
                    })
                });

                const data = await response.json();
                console.log("Server response:", data);

                if (!response.ok) {
                    alert(data.message || "Registration failed");
                    return;
                }

                alert('Registration successful! Please login.');
                window.location.href = 'login.html';

            } catch (error) {
                console.error('Error:', error);
                alert('Cannot connect to server. Make sure backend is running on port 3000.');
            }
        });
    </script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
