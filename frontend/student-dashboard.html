<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="d-flex align-items-center">
            <i class="fas fa-user-graduate me-2"></i>
            <h1>📚 Smart Attendance - Student Dashboard</h1>
        </div>
        <div class="user-info">
            <div class="d-flex flex-column align-items-end me-3">
                <span>Welcome, <strong id="studentName">Student</strong></span>
                <small class="text-light">ID: <strong id="studentId">N/A</strong></small>
            </div>
            <div class="dropdown">
                <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle me-1"></i>Menu
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="profile.html"><i class="fas fa-user me-2"></i>Profile</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item" id="logoutBtn" href="#"><i
                                class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Stats Section -->
        <div class="stats-grid">
            <div class="stat-card early">
                <h3>Early</h3>
                <div class="number" id="statEarly">0</div>
            </div>
            <div class="stat-card ontime">
                <h3>On-Time</h3>
                <div class="number" id="statOnTime">0</div>
            </div>
            <div class="stat-card late">
                <h3>Late</h3>
                <div class="number" id="statLate">0</div>
            </div>
            <div class="stat-card absent">
                <h3>Absent</h3>
                <div class="number" id="statAbsent">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Records</h3>
                <div class="number" id="statTotal">0</div>
            </div>
        </div>

        <!-- Check-in Section -->
        <div class="card">
            <h2>✅ Quick Check-In</h2>
            <form id="checkinForm">
                <div class="form-group">
                    <label for="subject">Subject (Optional)</label>
                    <input type="text" id="subject" placeholder="e.g., Math, Science, English">
                </div>
                <div class="form-group">
                    <label for="notes">Notes (Optional)</label>
                    <textarea id="notes" rows="2" placeholder="Any additional notes..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Check In Now</button>
            </form>
        </div>

        <!-- Attendance History -->
        <div class="card">
            <h2>📋 My Attendance History</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Subject</th>
                    </tr>
                </thead>
                <tbody id="attendanceTableBody">
                    <tr>
                        <td colspan="4" class="text-center loading">Loading your attendance records...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/student-dashboard.js"></script>
</body>

</html>
