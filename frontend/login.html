<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            min-height: 100vh;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: none;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        .brand-title {
            background: linear-gradient(90deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="login-card card shadow">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="brand-title fw-bold fs-1">Smart Attendance</h2>
                            <p class="text-muted">Sign in to continue</p>
                        </div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-medium">ID Number</label>
                                <input type="text" id="loginId" class="form-control form-control-lg" 
                                       placeholder="2023001 or TEACHER01" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-medium">Password</label>
                                <input type="password" id="loginPassword" class="form-control form-control-lg" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3 fw-semibold">
                                Login
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <a href="register.html" class="text-decoration-none text-primary">
                                Don't have an account? Register here
                            </a>
                        </div>

                        <div class="text-center mt-4 small text-muted">
                            Demo: Student <strong>2023001</strong> • Teacher <strong>TEACHER01</strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const id = document.getElementById('loginId').value.trim().toUpperCase();
            const password = document.getElementById('loginPassword').value;

            if (!id || !password) {
                alert("Please enter ID and Password");
                return;
            }

            let users = JSON.parse(localStorage.getItem("users")) || [];
            const user = users.find(u => u.id === id && u.password === password);

            if (!user) {
                alert("❌ Invalid ID or Password. Please register first.");
                return;
            }

            localStorage.setItem("currentUser", JSON.stringify({
                id: user.id,
                name: user.name,
                role: user.role
            }));

            // Redirect to correct dashboard
            if (user.role === "student" || id.startsWith("2023")) {
                window.location.href = "student - dashboard.html";
            } else {
                window.location.href = "teacher-dashboard.html";   // Teacher interface
            }
        });
    </script>
</body>
</html>
