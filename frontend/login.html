<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            min-height: 100vh;
        }
    </style>
    <!-- FIX: Removed <base target="_blank"> which broke all same-tab navigation -->
</head>

<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="login-card card shadow">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="brand-title fw-bold fs-1">Smart Attendance</h2>
                            <p class="text-muted">Sign in to continue</p>
                        </div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-medium">Email</label>
                                <input type="email" id="loginEmail" class="form-control form-control-lg"
                                    placeholder="your.email@example.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-medium">Password</label>
                                <input type="password" id="loginPassword" class="form-control form-control-lg" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3 fw-semibold">
                                Login
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <a href="register.html" class="text-decoration-none text-primary">
                                Don't have an account? Register here
                            </a>
                        </div>

                        <div class="text-center mt-4 small text-muted">
                            Sign in with your registered email address
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
