<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Settings - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/profile.css"> <!-- Gamitin ang parehong style ng profile para sa kulay -->
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="teacher-dashboard.html">⏰ Smart Attendance</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="teacher-dashboard.html">Dashboard</a>
                <a class="nav-link" href="profile.html">Profile</a>
                <a class="nav-link" href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="card mx-auto" style="max-width: 600px;"> <!-- Gawin nating malawak katulad ng profile -->
            <div class="card-body p-5">
                <h2 class="text-center mb-4 text-primary">📅 Set Class Schedule</h2>

                <form id="scheduleForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Subject / Class Name</label>
                        <input type="text" class="form-control form-control-lg" id="className"
                            placeholder="e.g. Mathematics - Grade 10" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Start Time</label>
                        <input type="time" class="form-control form-control-lg" id="startTime" required>
                        <small class="text-muted">This is the official time the class begins.</small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Late Allowance (Minutes)</label>
                        <input type="number" class="form-control form-control-lg" id="allowanceTime" min="0" max="30"
                            value="5" required>
                        <small class="text-muted">How many minutes after start time is still considered "On-Time"? (e.g.
                            5 mins)</small>
                    </div>

                    <button type="submit" class="btn btn-lg w-100 fw-bold"
                        style="background-color: #fd7e14; color: white;">
                        💾 Save Schedule
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem("currentUser");
            localStorage.removeItem("token");
            window.location.href = "index.html";
        }

        document.getElementById('scheduleForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Kunin ang mga datos na inilagay ng guro
            const classData = {
                name: document.getElementById('className').value,
                startTime: document.getElementById('startTime').value,
                allowance: document.getElementById('allowanceTime').value
            };

            // I-save ito sa localStorage (Pansamantala - kung walang database pa)
            // Sa totoong sistema, dito mo ito ipapadala sa iyong Backend/API
            localStorage.setItem('currentClassSettings', JSON.stringify(classData));

            alert('✅ Class Schedule Saved Successfully!');
            window.location.href = 'teacher-dashboard.html'; // Bumalik sa dashboard
        });

        // Kung may na-save na dati, ipakita ito sa form
        window.onload = function () {
            const saved = localStorage.getItem('currentClassSettings');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('className').value = data.name;
                document.getElementById('startTime').value = data.startTime;
                document.getElementById('allowanceTime').value = data.allowance;
            }
        }
    </script>
</body>

</html>
