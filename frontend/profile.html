<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Smart Attendance</a>
            <a href="index.html" class="nav-link text-white">Home</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="card mx-auto" style="max-width: 500px;">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">My Profile</h2>
                <div id="profileInfo" class="text-center"></div>
                <button onclick="logout()" class="btn btn-danger w-100 mt-4">Logout</button>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem("currentUser");
            window.location.href = "index.html";
        }

        window.onload = function() {
            const user = JSON.parse(localStorage.getItem("currentUser") || "{}");
            if (!user.id) {
                window.location.href = "login.html";
                return;
            }
            document.getElementById('profileInfo').innerHTML = `
                <h4>${user.name}</h4>
                <p><strong>ID:</strong> ${user.id}</p>
                <p><strong>Role:</strong> ${user.role === "student" ? "Student" : "Teacher"}</p>
            `;
        };
    </script>
</body>
</html>
