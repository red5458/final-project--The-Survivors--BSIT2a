<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            min-height: 100vh;
            color: #333;
        }
        .dashboard-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: none;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .navbar {
            background: rgba(0, 0, 0, 0.85) !important;
            backdrop-filter: blur(10px);
        }
        .brand-title {
            background: linear-gradient(90deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-early { background-color: #10b981; color: white; }
        .status-ontime { background-color: #3b82f6; color: white; }
        .status-late { background-color: #f59e0b; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-3 brand-title" href="index.html">SmartAttendance</a>
            <div class="d-flex align-items-center gap-3">
                <span id="userGreeting" class="badge bg-light text-dark px-3 py-2 fs-6"></span>
                <a href="profile.html" class="nav-link text-white fw-medium">Profile</a>
                <a href="#" onclick="logout()" class="nav-link text-white fw-medium">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="display-5 fw-bold text-white mb-2">Teacher Dashboard</h1>
        <p class="text-white-50 lead">Monitor live student attendance with auto-time classification</p>

        <!-- Overview Cards -->
        <div class="row g-4 mt-4">
            <div class="col-md-3">
                <div class="dashboard-card card text-center p-4">
                    <h3 id="presentCount" class="text-success fw-bold">0</h3>
                    <p class="mb-0">Present Today</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="dashboard-card card text-center p-4">
                    <h3 id="ontimePercent" class="text-primary fw-bold">0%</h3>
                    <p class="mb-0">On-Time Rate</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="dashboard-card card text-center p-4">
                    <h3 id="lateCount" class="text-warning fw-bold">0</h3>
                    <p class="mb-0">Late</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="dashboard-card card text-center p-4">
                    <h3 id="absentCount" class="text-danger fw-bold">0</h3>
                    <p class="mb-0">Absent</p>
                </div>
            </div>
        </div>

        <!-- Quick Check-In -->
        <div class="dashboard-card card mt-5">
            <div class="card-header bg-white border-0 py-3">
                <h5>Quick Student Check-In</h5>
            </div>
            <div class="card-body">
                <form id="checkinForm" class="row g-3">
                    <div class="col-md-6">
                        <input type="text" id="studentId" class="form-control form-control-lg" 
                               placeholder="Enter Student ID (e.g. 2023001)" required>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success btn-lg w-100">Check In Now</button>
                    </div>
                </form>
                <div id="checkinResult" class="mt-3 alert d-none"></div>
            </div>
        </div>

        <!-- Live Records -->
        <div class="dashboard-card card mt-4">
            <div class="card-header bg-white border-0 py-3">
                <h5>Live Attendance Records</h5>
            </div>
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="attendanceTable">
                    <thead class="table-light">
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Date</th>
                            <th>Time In</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></sc
