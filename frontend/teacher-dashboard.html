<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: #f8f9fa;
            min-height: 100vh;
        }
        .sidebar {
            background: linear-gradient(180deg, #6366f1, #8b5cf6);
            min-height: 100vh;
            color: white;
        }
        .stat-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .status-early { background: #d1fae5; color: #065f46; }
        .status-ontime { background: #dbeafe; color: #1e40af; }
        .status-late { background: #fef3c7; color: #92400e; }
        .status-absent { background: #fee2e2; color: #991b1b; }
        .attendance-table {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 sidebar p-4">
                <h4 class="mb-4"><i class="bi bi-mortarboard-fill"></i> Smart Attendance</h4>
                <nav class="nav flex-column">
                    <a class="nav-link text-white active" href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    <a class="nav-link text-white" href="index.html"><i class="bi bi-box-arrow-right"></i> Logout</a>
                </nav>
            </div>
            <div class="col-md-9 col-lg-10 p-4">
                <h2 class="mb-4">Teacher Dashboard</h2>
                <p class="text-muted">Monitor live student attendance with auto-time classification</p>

                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-1">Present Today</h6>
                                    <h3 class="mb-0" id="presentCount">0</h3>
                                </div>
                                <i class="bi bi-people-fill text-primary fs-1"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-1">On-Time Rate</h6>
                                    <h3 class="mb-0" id="onTimeRate">0%</h3>
                                </div>
                                <i class="bi bi-graph-up-arrow text-success fs-1"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-1">Late</h6>
                                    <h3 class="mb-0" id="lateCount">0</h3>
                                </div>
                                <i class="bi bi-clock-history text-warning fs-1"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-1">Absent</h6>
                                    <h3 class="mb-0" id="absentCount">0</h3>
                                </div>
                                <i class="bi bi-x-circle-fill text-danger fs-1"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search by Student ID or Name...">
                </div>

                <div class="attendance-table p-4">
                    <h5 class="mb-3">Live Attendance Records</h5>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Student ID</th>
                                    <th>Name</th>
                                    <th>Date</th>
                                    <th>Time In</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceTableBody">                               
                            </tbody>
                        </table>
                    </div>
                    <div id="loadingMessage" class="text-center text-muted py-4">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2">Loading attendance data...</p>
                    </div>
                    <div id="errorMessage" class="alert alert-danger d-none"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        
        const token = localStorage.getItem('token');
        if (!token) {
            alert('Please login first');
            window.location.href = 'login.html';
        }

        async function loadAttendanceData() {
            try {
                const response = await fetch(`${API_URL}/attendance/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        alert('Session expired. Please login again.');
                        localStorage.removeItem('token');
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error('Failed to fetch data');
                }

                const data = await response.json();
                displayAttendanceData(data);
                updateStats(data);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingMessage').classList.add('d-none');
                document.getElementById('errorMessage').textContent = 'Error loading data: ' + error.message;
                document.getElementById('errorMessage').classList.remove('d-none');
            }
        }

        function displayAttendanceData(records) {
            const tbody = document.getElementById('attendanceTableBody');
            const loadingMsg = document.getElementById('loadingMessage');
            
            loadingMsg.classList.add('d-none');
            tbody.innerHTML = '';

            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No attendance records found</td></tr>';
                return;
            }

            records.forEach(record => {
                const date = new Date(record.timeIn).toLocaleDateString();
                const time = new Date(record.timeIn).toLocaleTimeString();
                
                const statusClass = {
                    'Early': 'status-early',
                    'On-Time': 'status-ontime',
                    'Late': 'status-late',
                    'Absent': 'status-absent'
                }[record.status] || 'status-absent';

                const row = `
                    <tr>
                        <td>${record.studentId || 'N/A'}</td>
                        <td>${record.studentName || 'Unknown'}</td>
                        <td>${date}</td>
                        <td>${time}</td>
                        <td><span class="badge ${statusClass}">${record.status}</span></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function updateStats(records) {
            const total = records.length;
            const present = records.filter(r => r.status !== 'Absent').length;
            const onTime = records.filter(r => r.status === 'On-Time' || r.status === 'Early').length;
            const late = records.filter(r => r.status === 'Late').length;
            const absent = records.filter(r => r.status === 'Absent').length;

            document.getElementById('presentCount').textContent = present;
            document.getElementById('onTimeRate').textContent = total > 0 ? Math.round((onTime / total) * 100) + '%' : '0%';
            document.getElementById('lateCount').textContent = late;
            document.getElementById('absentCount').textContent = absent;
        }

        document.getElementById('searchInput').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const rows = document.querySelectorAll('#attendanceTableBody tr');
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        });
        window.onload = loadAttendanceData;
    </script>
</body>
</html>
